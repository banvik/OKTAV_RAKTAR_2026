<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
			crossorigin="anonymous"
		/>
		<link rel="stylesheet" href="styles.css" />
		<title>Termékek</title>
	</head>
	<body>
		<div class="nav">
			<a href="./index.html">Termékek</a>
			<a href="./warehouses.html">raktárak</a>
			<a href="./transactions.html">tranzakciók</a>
		</div>
		<div>
			<div class="inventory-container">
				<h1>Termékek</h1>
				<button id="new-item-btn" class="btn btn-primary">
					új tárgy felvétele
				</button>
				<button id="test-btn" class="btn btn-secondary">
					teszt tárgy felvétele
				</button>
				<table>
					<thead>
						<tr>
							<th id="th-name">Terméknév</th>
							<th id="th-category">Kategória</th>
							<th id="th-length">Hossz(mm)</th>
						</tr>
					</thead>
					<tbody id="inventory-tbody"></tbody>
				</table>
				<div id="form-container" class="hidden">
					<form id="item-form">
						<label>
							Név:
							<input type="text" id="item-name" required />
						</label>
						<label>
							Kategória:
							<input type="text" id="item-category" required />
						</label>
						<label>
							Hossz (mm):
							<input type="number" id="item-size" required />
						</label>
						<div class="form-btn-cont">
							<button id="submit-btn" type="submit">
								tárgy hozzáadása
							</button>
							<button id="cancel-btn" type="button">mégse</button>
						</div>
					</form>
				</div>
				<div id="item-card" class="hidden">
					<button id="card-close">X</button>
					<p id="card-name">megnevezés:</p>
					<p id="card-category">kategória:</p>
					<p id="card-length">hossz:</p>
				</div>
			</div>
		</div>
		<script type="module" src="script.js"></script>
	</body>
</html>
